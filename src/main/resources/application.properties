spring.application.name=api

# Database (for local run without Docker; overridden by env vars in Docker)
spring.datasource.url=jdbc:postgresql://localhost:5432/mydatabase
spring.datasource.username=myuser
spring.datasource.password=secret
spring.datasource.driver-class-name=org.postgresql.Driver

# Auto-create schema on startup
spring.sql.init.mode=always

# MyBatis
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=test.cdek.api.entity
mybatis.configuration.map-underscore-to-camel-case=true

# JWT
app.jwt.secret=mySecretKeyForJWTAuthenticationTaskTimeTrackerApp2024
app.jwt.expiration-ms=3600000

# Swagger UI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
